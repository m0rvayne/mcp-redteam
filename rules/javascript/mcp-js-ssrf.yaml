rules:
  - id: mcp-js-ssrf-fetch
    message: >
      User-controlled URL passed to fetch(). Tool arguments named url/uri/link/endpoint
      may point to internal services (127.0.0.1, metadata endpoints).
      Validate the URL scheme and host against an allowlist before making requests.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT003
      confidence: HIGH
      owasp: "MCP07: SSRF"
      cwe: "CWE-918: Server-Side Request Forgery"
    patterns:
      - pattern: fetch($URL, ...)
      - pattern-not: fetch("...", ...)
      # Exclude template literals with hardcoded scheme (API base + param)
      - pattern-not: fetch(`https://${...}...`, ...)
      - pattern-not: fetch(`http://${...}...`, ...)

  - id: mcp-js-ssrf-axios
    message: >
      User-controlled URL passed to axios request. Tool arguments named url/uri/link/endpoint
      may point to internal services. Validate the URL scheme and host against
      an allowlist before making requests.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT003
      confidence: HIGH
      owasp: "MCP07: SSRF"
      cwe: "CWE-918: Server-Side Request Forgery"
    patterns:
      - pattern-either:
          - pattern: axios.get($URL, ...)
          - pattern: axios.post($URL, ...)
          - pattern: axios.put($URL, ...)
          - pattern: axios.delete($URL, ...)
          - pattern: axios.patch($URL, ...)
          - pattern: axios($URL, ...)
      - pattern-not: axios.get("...", ...)
      - pattern-not: axios.post("...", ...)
      - pattern-not: axios.put("...", ...)
      - pattern-not: axios.delete("...", ...)
      - pattern-not: axios.patch("...", ...)
      - pattern-not: axios("...", ...)
      # Exclude template literals with hardcoded scheme
      - pattern-not: axios.get(`https://${...}...`, ...)
      - pattern-not: axios.get(`http://${...}...`, ...)
      - pattern-not: axios.post(`https://${...}...`, ...)
      - pattern-not: axios.post(`http://${...}...`, ...)
      - pattern-not: axios.put(`https://${...}...`, ...)
      - pattern-not: axios.delete(`https://${...}...`, ...)
      - pattern-not: axios.patch(`https://${...}...`, ...)

  - id: mcp-js-ssrf-got
    message: >
      User-controlled URL passed to got(). Tool arguments named url/uri/link/endpoint
      may point to internal services. Validate the URL scheme and host against
      an allowlist before making requests.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT003
      confidence: HIGH
      owasp: "MCP07: SSRF"
      cwe: "CWE-918: Server-Side Request Forgery"
    patterns:
      - pattern-either:
          - pattern: got($URL, ...)
          - pattern: got.get($URL, ...)
          - pattern: got.post($URL, ...)
      - pattern-not: got("...", ...)
      - pattern-not: got.get("...", ...)
      - pattern-not: got.post("...", ...)
      # Exclude template literals with hardcoded scheme
      - pattern-not: got(`https://${...}...`, ...)
      - pattern-not: got(`http://${...}...`, ...)
      - pattern-not: got.get(`https://${...}...`, ...)
      - pattern-not: got.post(`https://${...}...`, ...)
