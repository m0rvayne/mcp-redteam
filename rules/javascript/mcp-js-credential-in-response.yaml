rules:
  - id: mcp-js-credential-in-response
    message: >
      Return object contains a field that may expose credentials (token, api_key,
      password, secret, credential). Strip sensitive fields from tool responses or
      mask values before returning to the MCP client.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT027
      confidence: MEDIUM
      owasp: "MCP09: Credential Leakage"
      cwe: "CWE-200: Exposure of Sensitive Information"
    pattern-either:
      - pattern: |
          return { ..., token: $V, ... }
      - pattern: |
          return { ..., api_key: $V, ... }
      - pattern: |
          return { ..., apiKey: $V, ... }
      - pattern: |
          return { ..., password: $V, ... }
      - pattern: |
          return { ..., secret: $V, ... }
      - pattern: |
          return { ..., credential: $V, ... }
      - pattern: |
          return { ..., credentials: $V, ... }
      - pattern: |
          return { ..., access_token: $V, ... }
      - pattern: |
          return { ..., accessToken: $V, ... }
      - pattern: |
          return { ..., secret_key: $V, ... }
      - pattern: |
          return { ..., secretKey: $V, ... }
      - pattern: |
          return { ..., private_key: $V, ... }
      - pattern: |
          return { ..., privateKey: $V, ... }
