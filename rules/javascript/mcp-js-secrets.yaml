rules:
  - id: mcp-js-secrets-openai-key
    message: >
      Hardcoded OpenAI API key detected (sk-...). Store secrets in environment
      variables or a secrets manager, never in source code.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT005
      confidence: HIGH
      owasp: "MCP09: Secrets Exposure"
      cwe: "CWE-798: Hard-coded Credentials"
    pattern-regex: "sk-[a-zA-Z0-9]{20,}"

  - id: mcp-js-secrets-github-token
    message: >
      Hardcoded GitHub personal access token detected (ghp_...). Store secrets
      in environment variables or a secrets manager, never in source code.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT005
      confidence: HIGH
      owasp: "MCP09: Secrets Exposure"
      cwe: "CWE-798: Hard-coded Credentials"
    pattern-regex: "ghp_[a-zA-Z0-9]{36}"

  - id: mcp-js-secrets-aws-key
    message: >
      Hardcoded AWS access key detected (AKIA...). Store secrets in environment
      variables or a secrets manager, never in source code.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT005
      confidence: HIGH
      owasp: "MCP09: Secrets Exposure"
      cwe: "CWE-798: Hard-coded Credentials"
    pattern-regex: "AKIA[0-9A-Z]{16}"

  - id: mcp-js-secrets-bearer-token
    message: >
      Hardcoded Bearer token detected. Store secrets in environment variables
      or a secrets manager, never in source code.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT005
      confidence: MEDIUM
      owasp: "MCP09: Secrets Exposure"
      cwe: "CWE-798: Hard-coded Credentials"
    pattern-regex: "Bearer [a-zA-Z0-9_\\-\\.]{20,}"

  - id: mcp-js-secrets-generic-assignment
    message: >
      Potential hardcoded secret in variable assignment. API keys, passwords,
      and tokens should be loaded from environment variables or a secrets manager.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      rule_id: MRT005
      confidence: MEDIUM
      owasp: "MCP09: Secrets Exposure"
      cwe: "CWE-798: Hard-coded Credentials"
    pattern-either:
      - pattern: const apiKey = "..."
      - pattern: const api_key = "..."
      - pattern: const secret = "..."
      - pattern: const password = "..."
      - pattern: const token = "..."
      - pattern: const API_KEY = "..."
      - pattern: const API_SECRET = "..."
      - pattern: const SECRET_KEY = "..."
      - pattern: let apiKey = "..."
      - pattern: let api_key = "..."
      - pattern: let secret = "..."
      - pattern: let password = "..."
      - pattern: let token = "..."
      - pattern: var apiKey = "..."
      - pattern: var api_key = "..."
      - pattern: var secret = "..."
      - pattern: var password = "..."
      - pattern: var token = "..."
