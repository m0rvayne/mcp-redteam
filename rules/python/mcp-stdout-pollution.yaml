rules:
  - id: mcp-python-stdout-pollution
    message: >
      print() call detected in MCP server code. In stdio transport mode,
      print() pollutes the JSON-RPC stream and breaks the protocol.
      Use logging.info() or sys.stderr.write() instead.
    severity: INFO
    languages: [python]
    metadata:
      category: health
      rule_id: MRT006
      confidence: MEDIUM
      owasp: "MCP07: Protocol Pollution"
    patterns:
      - pattern-either:
          - pattern: print(...)
          - pattern: sys.stdout.write(...)
      - pattern-not: print(..., file=sys.stderr, ...)
      - pattern-not: print(..., file=sys.stderr)
      - pattern-not-inside: |
          if __name__ == "__main__":
              ...
      - pattern-not-inside: |
          if __name__ == '__main__':
              ...
    paths:
      exclude:
        - "*http*"
        - "*transport*"
        - "*streamable*"
        - "*sse*"
        - "*cli*"
        - "*__main__*"
        - "*setup*"
        - "*config*"
