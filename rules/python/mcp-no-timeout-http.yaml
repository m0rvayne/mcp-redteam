rules:
  - id: mcp-python-no-timeout-requests-get
    message: >
      HTTP request without timeout parameter. Without a timeout, the MCP server
      can hang indefinitely waiting for a response, blocking the tool execution.
      Always set timeout= (e.g., timeout=30).
    severity: WARNING
    languages: [python]
    metadata:
      category: health
      rule_id: MRT022
      confidence: HIGH
      owasp: "MCP15: Missing Timeout"
    patterns:
      - pattern: requests.get(...)
      - pattern-not: requests.get(..., timeout=..., ...)

