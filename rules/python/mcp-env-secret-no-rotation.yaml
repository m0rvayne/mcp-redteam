rules:
  - id: mcp-python-env-secret-getenv
    message: >
      Secret loaded from environment variable and used directly without
      expiry or rotation check. Consider using a secrets manager with
      automatic rotation, or at minimum validate the secret is not expired.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      rule_id: MRT021
      confidence: MEDIUM
      owasp: "MCP14: Static Secrets"
    patterns:
      - pattern-either:
          - pattern: os.getenv("$NAME")
          - pattern: os.environ["$NAME"]
          - pattern: os.environ.get("$NAME")
          - pattern: os.environ.get("$NAME", ...)
      - metavariable-regex:
          metavariable: $NAME
          regex: .*(KEY|SECRET|TOKEN|PASSWORD|CREDENTIAL|PRIVATE).*
