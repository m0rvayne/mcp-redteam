rules:
  - id: mcp-python-credential-in-code
    message: >
      Hardcoded credential detected. Use environment variables (os.environ, os.getenv)
      or a secrets manager instead of embedding credentials in source code.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      rule_id: MRT005
      confidence: MEDIUM
      owasp: "MCP06: Hardcoded Secrets"
    patterns:
      - pattern-either:
          - pattern: $VAR = "sk-..."
          - pattern: $VAR = "ghp_..."
          - pattern: $VAR = "gho_..."
          - pattern: $VAR = "AKIA..."
          - patterns:
              - pattern: $VAR = "$VALUE"
              - metavariable-pattern:
                  metavariable: $VAR
                  pattern-either:
                    - pattern: api_key
                    - pattern: apikey
                    - pattern: api_secret
                    - pattern: secret_key
                    - pattern: password
                    - pattern: passwd
                    - pattern: access_token
                    - pattern: auth_token
                    - pattern: private_key
              - metavariable-regex:
                  metavariable: $VALUE
                  regex: .{8,}
      - pattern-not: $VAR = os.environ[...]
      - pattern-not: $VAR = os.environ.get(...)
      - pattern-not: $VAR = os.getenv(...)
