rules:
  - id: mcp-python-missing-signal-handler
    message: >
      MCP server runs without SIGTERM/SIGINT signal handlers. Without graceful
      shutdown handling, the server may leave orphan processes, open connections,
      or corrupt state on termination. Add signal.signal(SIGTERM, handler) and
      signal.signal(SIGINT, handler) before server.run().
    severity: WARNING
    languages: [python]
    metadata:
      category: health
      rule_id: MRT018
      confidence: MEDIUM
      owasp: "MCP11: Missing Graceful Shutdown"
    patterns:
      - pattern-either:
          - pattern: $SERVER.run(...)
          - pattern: asyncio.run(...)
      - pattern-not-inside: |
          ...
          signal.signal(...)
          ...
