rules:
  - id: mcp-python-credential-in-response
    message: >
      Tool response contains a field that may expose credentials (api_key,
      password, token, secret). Strip sensitive fields from responses or
      mask values before returning.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      rule_id: MRT008
      confidence: MEDIUM
      owasp: "MCP09: Credential Leakage"
    pattern-either:
      - pattern: |
          return {..., "api_key": $V, ...}
      - pattern: |
          return {..., "password": $V, ...}
      - pattern: |
          return {..., "token": $V, ...}
      - pattern: |
          return {..., "secret": $V, ...}
      - pattern: |
          return {..., "credential": $V, ...}
      - pattern: |
          return {..., "credentials": $V, ...}
      - pattern: |
          return {..., "secret_key": $V, ...}
      - pattern: |
          return {..., "access_token": $V, ...}
      - pattern: |
          return {..., "auth_token": $V, ...}
      - pattern: |
          return {..., "private_key": $V, ...}
      - pattern: |
          return {..., "api_secret": $V, ...}
