name: 'MCP Redteam Security Scan'
description: 'Scan MCP servers for security vulnerabilities with 25+ Semgrep rules'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to MCP server source code'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at this severity or above (critical, high)'
    required: false
    default: ''
  format:
    description: 'Output format (terminal, json, sarif, html)'
    required: false
    default: 'sarif'
  upload-sarif:
    description: 'Upload SARIF to GitHub Security tab'
    required: false
    default: 'true'

outputs:
  findings-count:
    description: 'Number of findings'
    value: ${{ steps.scan.outputs.findings-count }}
  risk-score:
    description: 'Risk score (0-100)'
    value: ${{ steps.scan.outputs.risk-score }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install mcp-redteam
      shell: bash
      run: pip install redteam-mcp 'semgrep>=1.67,<2.0'

    - name: Run scan
      id: scan
      shell: bash
      run: |
        ARGS="scan ${{ inputs.path }} --no-llm --no-config --format sarif -o results.sarif"
        if [ -n "${{ inputs.fail-on }}" ]; then
          ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"
        fi
        mcp-redteam $ARGS || true

        if [ -f results.sarif ]; then
          FINDINGS=$(python3 -c "import json; d=json.load(open('results.sarif')); print(len(d.get('runs',[{}])[0].get('results',[])))")
          echo "findings-count=$FINDINGS" >> $GITHUB_OUTPUT
          RISK=$(python3 -c "import json; d=json.load(open('results.sarif')); print(min(100, sum(25 if r.get('level')=='error' else 5 if r.get('level')=='warning' else 1 for r in d['runs'][0]['results'])))" 2>/dev/null || echo "0")
          echo "risk-score=$RISK" >> $GITHUB_OUTPUT
        fi

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
      continue-on-error: true
